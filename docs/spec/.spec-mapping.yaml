### 5. Dashboard (首页)
- **Route**: `/src/routes/index.tsx`
- **Features**:
  - Stats Cards (customers, opportunities, contracts, new customers)
  - Revenue trend chart (LineChart)
  - Opportunity stage funnel (BarChart)
  - Recent followups list
  - Active opportunities list

### 6. Layout
- **Sidebar**: `/src/components/layout/sidebar.tsx` (collapsible)
- **Root Layout**: `/src/routes/__root.tsx`

### 7. Shared
- **Types**: `/src/types/crm.ts`
- **Mock Data**: `/src/mock/crm.ts`
- **Dictionaries**: `/src/lib/dict.ts`

## Data Dictionaries
Defined in `/src/lib/dict.ts`:
- `dict-customer-status`: potential, active, inactive
- `dict-opportunity-stage`: initial, qualified, proposal, negotiation, won, lost
- `dict-contract-status`: draft, pending, active, completed, terminated
- `dict-followup-type`: call, email, visit, meeting
- `dict-industry`: Multiple industries

