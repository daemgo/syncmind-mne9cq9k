# CRM Demo Specification Mapping

## Project Overview
- **Project**: syncMind CRM Demo
- **Generated**: 2026-03-31
- **Tech Stack**: TanStack Start + Vite, React, TypeScript, Tailwind CSS v4, shadcn/ui

## Module Mapping

### 1. Customer Management (客户管理)
- **Types**: `/src/types/crm.ts` - Customer, CustomerStatus
- **Mock Data**: `/src/mock/crm.ts` - 18 customers
- **Components**:
  - Filter: `/src/components/customer/customer-filter.tsx`
  - Table: `/src/components/customer/customer-table.tsx`
  - Detail: `/src/components/customer/customer-detail.tsx`
  - Form Dialog: `/src/components/customer/customer-form-dialog.tsx`
- **Routes**:
  - List: `/src/routes/customer/index.tsx`
  - Detail: `/src/routes/customer/$id.tsx`

